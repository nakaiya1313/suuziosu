<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ナンバータッチ ｜ 数字を順番にタップ</title>
<style>
  :root{ --bg:#14304C; --bg2:#1C4366; --accent:#FF7A59; --accent-d:#e85f3d; --txt:#fff; --sub:#aebfce;
    --tile:#fff; --tile-ink:#16222E; --panel:rgba(255,255,255,.06); --line:rgba(255,255,255,.16);
    --good:#43C59E; --rad:12px; --card:#142a40; --done-bg:rgba(255,255,255,.12); --done-ink:rgba(255,255,255,.4); }
  body[data-theme="1"]{ --bg:#FDF2F8; --bg2:#EDE9FE; --accent:#F472A0; --accent-d:#e05b8c; --txt:#43354f; --sub:#9b8aac; --tile:#fff; --tile-ink:#43354f; --panel:rgba(0,0,0,.04); --line:rgba(0,0,0,.10); --rad:16px; --card:#fff; --done-bg:rgba(0,0,0,.08); --done-ink:rgba(0,0,0,.3); --good:#86E3CE; }
  body[data-theme="2"]{ --bg:#0E1116; --bg2:#171C24; --accent:#00D1B2; --accent-d:#00ab92; --txt:#fff; --sub:#9aa7b5; --tile:#222a35; --tile-ink:#fff; --rad:3px; --card:#161b22; --done-bg:rgba(255,255,255,.08); --done-ink:rgba(255,255,255,.35); --good:#00D1B2; }
  body[data-theme="3"]{ --bg:#15151B; --bg2:#26262F; --accent:#7C9CFF; --accent-d:#5f80ea; --txt:#fff; --sub:#a7adba; --tile:#fff; --tile-ink:#1a1d24; --rad:12px; --card:#1d1d26; --done-bg:rgba(255,255,255,.1); --done-ink:rgba(255,255,255,.38); }
  body[data-theme="4"]{ --bg:#ECFDF5; --bg2:#E0F2FE; --accent:#34C9A0; --accent-d:#28a886; --txt:#1f4a40; --sub:#6b9b8e; --tile:#fff; --tile-ink:#1f4a40; --panel:rgba(0,0,0,.04); --line:rgba(0,0,0,.1); --rad:22px; --card:#fff; --done-bg:rgba(0,0,0,.07); --done-ink:rgba(0,0,0,.28); --good:#7CE0C0; }
  body[data-theme="5"]{ --bg:#E9ECEF; --bg2:#DDE1E6; --accent:#495057; --accent-d:#343a40; --txt:#212529; --sub:#868e96; --tile:#fff; --tile-ink:#212529; --panel:rgba(0,0,0,.05); --line:rgba(0,0,0,.14); --rad:2px; --card:#fff; --done-bg:rgba(0,0,0,.08); --done-ink:rgba(0,0,0,.3); --good:#868e96; }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{ background:linear-gradient(160deg,var(--bg),var(--bg2)); color:var(--txt); height:100dvh; overflow:hidden;
    font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,system-ui,sans-serif;
    -webkit-text-size-adjust:100%; display:flex; flex-direction:column; transition:background .3s; }
  .wrap{ width:100%; max-width:480px; margin:0 auto; flex:1; display:flex; flex-direction:column; padding:8px 12px calc(8px + env(safe-area-inset-bottom)); min-height:0; }

  header{ display:flex; align-items:center; gap:6px; padding:4px 2px; }
  .brand{ font-size:1.15rem; font-weight:800; } .brand .em{ color:var(--accent); }
  .ico{ width:42px; height:42px; border-radius:var(--rad); border:1px solid var(--line); background:var(--panel); color:var(--txt); font-size:1.05rem; cursor:pointer; }
  .ico.first{ margin-left:auto; }

  .hud{ display:flex; gap:8px; margin:4px 0 8px; }
  .stat{ flex:1; background:var(--panel); border:1px solid var(--line); border-radius:var(--rad); padding:7px 8px; text-align:center; }
  .stat .l{ font-size:.68rem; color:var(--sub); font-weight:700; } .stat .n{ font-size:1.25rem; font-weight:800; color:var(--txt); }
  .stat .n.next{ color:var(--accent); }
  .barwrap{ height:12px; background:var(--panel); border:1px solid var(--line); border-radius:999px; overflow:hidden; margin-bottom:10px; }
  .bar{ height:100%; width:100%; background:linear-gradient(90deg,var(--good),var(--accent)); border-radius:999px; transition:width .1s linear; }

  .board{ flex:1; min-height:0; display:grid; gap:7px; align-content:center; }
  .board.sty-roman .tile{ font-family:"Times New Roman","Georgia",serif; letter-spacing:.01em; }
  .tile{ background:var(--tile); color:var(--tile-ink); border:none; border-radius:var(--rad); font-weight:800;
    font-size:var(--cell-fs,1.6rem); aspect-ratio:1; display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 3px 0 rgba(0,0,0,.16); overflow:hidden; white-space:nowrap; }
  .tile:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.16); }
  .tile.done{ background:var(--done-bg)!important; color:var(--done-ink)!important; box-shadow:none; }
  .tile.empty{ background:transparent; box-shadow:none; pointer-events:none; }
  .tile.bad{ animation:bad .3s; }
  @keyframes bad{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px); background:#ff6b6b} 75%{transform:translateX(5px); background:#ff6b6b} }

  .toast{ position:fixed; top:28%; left:50%; transform:translate(-50%,-50%) scale(.6); background:rgba(0,0,0,.55);
    padding:12px 24px; border-radius:16px; font-size:1.5rem; font-weight:800; color:#fff; opacity:0; pointer-events:none; z-index:15; }
  .toast.show{ animation:toast 1s ease; }
  @keyframes toast{ 0%{opacity:0; transform:translate(-50%,-50%) scale(.6)} 25%{opacity:1; transform:translate(-50%,-50%) scale(1.05)} 80%{opacity:1} 100%{opacity:0} }

  .ad{ margin-top:8px; }
  .ad .lb{ font-size:.65rem; color:var(--sub); text-align:center; }
  .adbox{ width:300px; max-width:100%; min-height:60px; margin:2px auto 0; display:flex; align-items:center; justify-content:center;
    border:1px dashed var(--line); border-radius:var(--rad); color:var(--sub); font-size:.78rem; text-align:center; padding:4px; }

  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; padding:20px; z-index:20; }
  .overlay.hide{ display:none; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:20px; padding:22px; max-width:380px; width:100%; text-align:center; color:var(--txt); }
  .card h1{ margin:0 0 2px; font-size:1.55rem; } .card h1 .em{ color:var(--accent); }
  .card p{ color:var(--sub); font-size:.92rem; line-height:1.6; margin:6px 0 0; }
  .opt{ text-align:left; margin-top:14px; } .opt .ol{ font-size:.8rem; color:var(--sub); font-weight:800; margin:0 0 6px; }
  .seg{ display:flex; gap:6px; background:var(--panel); border-radius:12px; padding:4px; flex-wrap:wrap; }
  .seg-b{ flex:1 0 28%; border:none; background:transparent; color:var(--txt); font-weight:800; font-size:.9rem; padding:10px 6px; border-radius:9px; cursor:pointer; }
  .seg-b.on{ background:var(--accent); color:#fff; }
  .big-start{ width:100%; height:58px; border:none; border-radius:var(--rad); background:var(--accent); color:#fff;
    font-size:1.15rem; font-weight:800; cursor:pointer; box-shadow:0 4px 0 var(--accent-d); margin-top:16px; }
  .big-start:active{ transform:translateY(2px); box-shadow:0 2px 0 var(--accent-d); }
  .ghost{ width:100%; height:46px; border:1px solid var(--line); background:transparent; color:var(--txt); border-radius:var(--rad); font-weight:800; cursor:pointer; margin-top:10px; }
  .ov-stats{ background:var(--panel); border-radius:12px; padding:12px; margin-top:14px; }
  .ov-stats .row{ display:flex; justify-content:space-between; padding:5px 2px; } .ov-stats .row .v{ font-weight:800; }
  .best{ color:var(--accent); font-weight:800; margin-top:10px; }
</style>
</head>
<body data-theme="0">
<div class="wrap">
  <header>
    <div class="brand">ナンバー<span class="em">タッチ</span></div>
    <button class="ico first" id="theme" aria-label="テーマ変更">🎨</button>
    <button class="ico" id="pause" aria-label="一時停止">⏸</button>
    <button class="ico" id="mute" aria-label="音">🔊</button>
  </header>

  <div class="hud">
    <div class="stat"><div class="l">レベル</div><div class="n" id="hud-level">1</div></div>
    <div class="stat"><div class="l">次にタップ</div><div class="n next" id="hud-next">1</div></div>
    <div class="stat"><div class="l">ミス</div><div class="n" id="hud-miss">0</div></div>
  </div>
  <div class="barwrap"><div class="bar" id="bar"></div></div>

  <div class="board" id="board"></div>

  <div class="ad"><div class="lb">広告</div>
    <div class="adbox" id="adbox">広告を入れる場合はこの枠に忍者AdMaxのタグを貼り付け</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- START -->
<div class="overlay" id="ov-start"><div class="card">
  <h1>ナンバー<span class="em">タッチ</span></h1>
  <p>1から順番に、できるだけ速くタップ！レベルが上がるほど数字が増えます。時間切れでゲームオーバー。</p>
  <div class="opt"><div class="ol">数字の種類</div>
    <div class="seg" id="sel-style">
      <button class="seg-b on" data-v="std">標準</button>
      <button class="seg-b" data-v="kanji">漢数字</button>
      <button class="seg-b" data-v="daiji">大字</button>
      <button class="seg-b" data-v="roman">ローマ</button>
      <button class="seg-b" data-v="maru">丸数字</button>
      <button class="seg-b" data-v="abc">ABC</button>
    </div></div>
  <div class="opt"><div class="ol">難易度（スピード）</div>
    <div class="seg" id="sel-diff">
      <button class="seg-b on" data-v="normal">基本</button>
      <button class="seg-b" data-v="easy">イージー（ゆっくり）</button>
    </div></div>
  <button class="ghost" id="title-theme">🎨 テーマ：ナイトブルー（タップで変更）</button>
  <div class="best" id="start-best"></div>
  <button class="big-start" id="btn-start">スタート</button>
</div></div>

<!-- PAUSE -->
<div class="overlay hide" id="ov-pause"><div class="card">
  <h1>一時停止中</h1>
  <button class="big-start" id="btn-resume">再開する</button>
  <button class="ghost" id="btn-quit">やめてタイトルへ</button>
</div></div>

<!-- GAME OVER -->
<div class="overlay hide" id="ov-over"><div class="card">
  <h1>ゲームオーバー</h1>
  <div class="ov-stats">
    <div class="row"><span>到達レベル</span><span class="v" id="o-level">-</span></div>
    <div class="row"><span>タップした数字</span><span class="v" id="o-total">-</span></div>
    <div class="row"><span>ミス</span><span class="v" id="o-miss">-</span></div>
  </div>
  <div class="best" id="over-best"></div>
  <button class="big-start" id="btn-again">もう一度</button>
  <button class="ghost" id="btn-title">設定を変える（タイトルへ）</button>
</div></div>

<script>
(function(){
  var board=document.getElementById('board'), bar=document.getElementById('bar'), toast=document.getElementById('toast');
  var hudLevel=document.getElementById('hud-level'), hudNext=document.getElementById('hud-next'), hudMiss=document.getElementById('hud-miss');

  var level=1, count=0, nextNum=1, mistakes=0, total=0, remain=0, limit=0, timer=null, playing=false, paused=false;
  var style='std', diff='normal';
  var DIFF={ normal:{mult:1.0, pen:1.5}, easy:{mult:1.85, pen:1.0} };

  var PASTEL=['#FBCFE8','#C7D2FE','#BBF7D0','#FDE68A','#BFDBFE','#DDD6FE','#FECACA','#A7F3D0'];
  var VIVID=['#FF5D8F','#00C2A8','#FFB020','#5B7CFA','#A66CFF','#FF7A45','#22C55E','#EF4444'];
  var CANDY=['#A7F3D0','#BAE6FD','#FBCFE8','#FEF08A','#DDD6FE','#FDBA74'];
  var THEMES=[ {name:'ナイトブルー'}, {name:'パステル',pal:PASTEL,pt:'#43354f'}, {name:'スクエア',pal:VIVID,pt:'#fff'},
    {name:'ダーク'}, {name:'キャンディ',pal:CANDY,pt:'#1f4a40'}, {name:'モノクロ'} ];

  function bestKey(){ return 'numtouch_best_'+diff; }
  function lsGet(k){ try{ return parseInt(localStorage.getItem(k),10)||0; }catch(e){ return 0; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,String(v)); }catch(e){} }

  /* number styles */
  function toKanji(n){ if(n<=0) return '〇'; var d=['','一','二','三','四','五','六','七','八','九'];
    var th=Math.floor(n/1000)%10,hu=Math.floor(n/100)%10,te=Math.floor(n/10)%10,on=n%10,o='';
    if(th)o+=(th===1?'':d[th])+'千'; if(hu)o+=(hu===1?'':d[hu])+'百'; if(te)o+=(te===1?'':d[te])+'十'; if(on)o+=d[on]; return o; }
  function toDaiji(n){ if(n<=0) return '零'; var d=['','壱','弐','参','肆','伍','陸','漆','捌','玖'];
    var th=Math.floor(n/1000)%10,hu=Math.floor(n/100)%10,te=Math.floor(n/10)%10,on=n%10,o='';
    if(th)o+=d[th]+'仟'; if(hu)o+=d[hu]+'佰'; if(te)o+=(te===1?'':d[te])+'拾'; if(on)o+=d[on]; return o; }
  function toRoman(n){ var m=[[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']],s=''; for(var i=0;i<m.length;i++){ while(n>=m[i][0]){ s+=m[i][1]; n-=m[i][0]; } } return s; }
  function toCircled(n){ if(n>=1&&n<=20) return String.fromCharCode(0x2460+(n-1)); if(n>=21&&n<=35) return String.fromCharCode(0x3251+(n-21)); if(n>=36&&n<=50) return String.fromCharCode(0x32B1+(n-36)); return String(n); }
  function toAlpha(n){ var s=''; while(n>0){ n--; s=String.fromCharCode(65+(n%26))+s; n=Math.floor(n/26); } return s; }
  function fmt(n){ if(style==='kanji')return toKanji(n); if(style==='daiji')return toDaiji(n); if(style==='roman')return toRoman(n); if(style==='maru')return toCircled(n); if(style==='abc')return toAlpha(n); return String(n); }

  /* audio */
  var AC=null, muted=false;
  function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); return AC; }
  function beep(f,d,t,v){ var a=ac(); if(!a||muted)return; var o=a.createOscillator(),g=a.createGain(); o.type=t||'square'; o.frequency.value=f;
    g.gain.setValueAtTime(v||.05,a.currentTime); g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d); o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+d); }
  function sTap(n){ beep(520+Math.min(n,30)*14,.08,'square',.05); }
  function sBad(){ beep(150,.25,'sawtooth',.06); }
  function sLevel(){ [523,659,784].forEach(function(f,i){ setTimeout(function(){beep(f,.18,'triangle',.06);}, i*70); }); }
  function sOver(){ [440,330,220].forEach(function(f,i){ setTimeout(function(){beep(f,.3,'sine',.07);}, i*150); }); }
  var muteBtn=document.getElementById('mute');
  muteBtn.addEventListener('click', function(){ muted=!muted; muteBtn.textContent=muted?'🔇':'🔊'; if(!muted) ac(); });

  function showToast(t){ toast.textContent=t; toast.classList.remove('show'); void toast.offsetWidth; toast.classList.add('show'); }

  /* theme */
  var theme=lsGet('numtouch_theme'); if(theme<0||theme>=THEMES.length) theme=0;
  function applyTheme(){ document.body.setAttribute('data-theme',theme); document.getElementById('title-theme').textContent='🎨 テーマ：'+THEMES[theme].name+'（タップで変更）'; }
  function skinTiles(){ var pal=THEMES[theme].pal, pt=THEMES[theme].pt;
    board.querySelectorAll('.tile').forEach(function(b){ if(b.classList.contains('empty')||b.classList.contains('done')) return;
      var n=parseInt(b.dataset.n,10); if(pal){ b.style.background=pal[(n-1)%pal.length]; b.style.color=pt; } else { b.style.background=''; b.style.color=''; } }); }
  function cycleTheme(){ theme=(theme+1)%THEMES.length; applyTheme(); skinTiles(); lsSet('numtouch_theme',theme); if(playing&&!paused) showToast(THEMES[theme].name); }
  document.getElementById('theme').addEventListener('click', cycleTheme);
  document.getElementById('title-theme').addEventListener('click', cycleTheme);
  applyTheme();

  function countFor(lv){ return 3+lv*2; }
  function limitFor(lv,c){ var per=Math.max(0.6, 1.3-(lv-1)*0.05); return c*per*DIFF[diff].mult; }
  function fitFont(){ var cols=Math.ceil(Math.sqrt(count)); var w=board.clientWidth, gap=7, cw=(w-gap*(cols-1))/cols;
    var maxLen=1; for(var n=1;n<=count;n++){ var L=fmt(n).length; if(L>maxLen) maxLen=L; }
    var px=Math.min(cw*0.5, (cw*0.82)/(maxLen*0.62)); board.style.setProperty('--cell-fs', px+'px'); }

  function buildBoard(){
    var cols=Math.ceil(Math.sqrt(count)), rows=Math.ceil(count/cols), cells=cols*rows;
    board.className='board sty-'+style; board.style.gridTemplateColumns='repeat('+cols+',1fr)';
    var order=[]; for(var i=0;i<cells;i++) order.push(i);
    for(var j=order.length-1;j>0;j--){ var k=Math.floor(Math.random()*(j+1)); var tmp=order[j];order[j]=order[k];order[k]=tmp; }
    var slot=new Array(cells).fill(0); for(var n=1;n<=count;n++){ slot[order[n-1]]=n; }
    board.innerHTML='';
    for(var c=0;c<cells;c++){ var b=document.createElement('button');
      if(slot[c]===0){ b.className='tile empty'; } else { b.className='tile'; b.textContent=fmt(slot[c]); b.dataset.n=slot[c]; }
      board.appendChild(b); }
    skinTiles(); requestAnimationFrame(fitFont);
  }

  function updateBar(){ bar.style.width=Math.max(0,(remain/limit*100))+'%'; }
  function newLevel(){ count=countFor(level); nextNum=1; hudLevel.textContent=level; hudNext.textContent=fmt(1);
    limit=limitFor(level,count); remain=limit; updateBar(); buildBoard(); }
  function tick(){ if(paused) return; remain-=0.1; if(remain<=0){ remain=0; updateBar(); gameOver(); return; } updateBar(); }

  function start(){ level=1; mistakes=0; total=0; playing=true; paused=false; hudMiss.textContent='0';
    document.getElementById('ov-start').classList.add('hide'); document.getElementById('ov-over').classList.add('hide'); document.getElementById('ov-pause').classList.add('hide');
    ac(); newLevel(); if(timer) clearInterval(timer); timer=setInterval(tick,100); }
  function levelUp(){ level++; sLevel(); showToast('レベル '+level); newLevel(); }
  function gameOver(){ playing=false; if(timer){ clearInterval(timer); timer=null; } sOver();
    var k=bestKey(), best=lsGet(k); if(level>best){ best=level; lsSet(k,best); }
    document.getElementById('o-level').textContent=level; document.getElementById('o-total').textContent=total; document.getElementById('o-miss').textContent=mistakes;
    document.getElementById('over-best').textContent='ベスト到達レベル（'+(diff==='easy'?'イージー':'基本')+'）：'+best;
    document.getElementById('ov-over').classList.remove('hide'); }

  board.addEventListener('click', function(e){
    if(!playing||paused) return; var b=e.target.closest('.tile'); if(!b||b.classList.contains('empty')||b.classList.contains('done')) return;
    var n=parseInt(b.dataset.n,10);
    if(n===nextNum){ b.classList.add('done'); b.style.background=''; b.style.color=''; sTap(n); total++; nextNum++;
      if(nextNum>count){ levelUp(); } else { hudNext.textContent=fmt(nextNum); } }
    else { mistakes++; hudMiss.textContent=mistakes; remain=Math.max(0,remain-DIFF[diff].pen); updateBar();
      b.classList.remove('bad'); void b.offsetWidth; b.classList.add('bad'); sBad(); }
  });
  window.addEventListener('resize', function(){ if(playing) fitFont(); });

  /* pause */
  document.getElementById('pause').addEventListener('click', function(){ if(!playing) return; paused=true; document.getElementById('ov-pause').classList.remove('hide'); });
  document.getElementById('btn-resume').addEventListener('click', function(){ paused=false; document.getElementById('ov-pause').classList.add('hide'); });
  document.getElementById('btn-quit').addEventListener('click', function(){ paused=false; playing=false; if(timer){clearInterval(timer);timer=null;} document.getElementById('ov-pause').classList.add('hide'); toTitle(); });

  /* selectors */
  document.getElementById('sel-style').addEventListener('click', function(e){ var b=e.target.closest('.seg-b'); if(!b)return; style=b.dataset.v; this.querySelectorAll('.seg-b').forEach(function(x){x.classList.toggle('on',x===b);}); });
  document.getElementById('sel-diff').addEventListener('click', function(e){ var b=e.target.closest('.seg-b'); if(!b)return; diff=b.dataset.v; this.querySelectorAll('.seg-b').forEach(function(x){x.classList.toggle('on',x===b);}); refreshStartBest(); });
  function refreshStartBest(){ var bv=lsGet(bestKey()); document.getElementById('start-best').textContent = bv>0 ? ('ベスト到達レベル（'+(diff==='easy'?'イージー':'基本')+'）：'+bv) : ''; }
  function toTitle(){ refreshStartBest(); document.getElementById('ov-over').classList.add('hide'); document.getElementById('ov-start').classList.remove('hide'); }

  document.getElementById('btn-start').addEventListener('click', start);
  document.getElementById('btn-again').addEventListener('click', start);
  document.getElementById('btn-title').addEventListener('click', toTitle);
  refreshStartBest();
})();
</script>
</body>
</html>
